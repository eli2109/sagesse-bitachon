name = "sagesse-bitachon-push"
main = "dist/worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = []

# Free KV namespace for push subscriptions (create once: npx wrangler kv namespace create SUBSCRIPTIONS)
# Then paste the id below and uncomment.
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "d35f6899238d43438a59837160900db7"

[triggers]
# Every 3 hours (UTC)
crons = ["0 */3 * * *"]

[vars]
VAPID_SUBJECT = "mailto:bitachon@example.com"
# Public key is not secret; private key goes in secrets / .dev.vars
VAPID_PUBLIC_KEY = "BDOHuJxy-7QveDgDGewF8cj3b9zMjuTl3lpwEfZfjdfvhXvMKJ7Sukc1iQXZMgnmxJrisOdarHQGUMQMAm2OzIo"
